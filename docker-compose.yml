services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: traffic-source:latest
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_PATH: /app/data/analytics.db
    expose:
      - "3000"
    volumes:
      - traffic_source_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/api/auth/status >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: traffic-source-nginx:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - ./.env.production
    environment:
      DOMAIN: traffic.muneersahel.com
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - nginx_certs:/etc/nginx/certs
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    env_file:
      - ./.env.production
    environment:
      DOMAIN: traffic.muneersahel.com
      CERTBOT_WEBROOT: /var/www/certbot
    pid: "service:nginx"
    entrypoint: ["/bin/sh", "/usr/local/bin/certbot-renew.sh"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - nginx_certs:/etc/nginx/certs
      - ./scripts/certbot-renew.sh:/usr/local/bin/certbot-renew.sh:ro

  cron:
    image: traffic-source:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      CRON_TARGET_URL: http://app:3000
      CRON_INTERVAL_SECONDS: 60
      DAILY_AGGREGATE_HOUR_UTC: 0
    command: ["./run-service.sh", "cron"]

volumes:
  traffic_source_data:
  letsencrypt:
  certbot_webroot:
  nginx_certs:
